<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d38;
    --text: #f0f0f5;
    --muted: #6b6f80;
    --accent: #5b8af0;
    --income: #3dd68c;
    --expense: #f05b5b;
    --savings: #f0c45b;
    --utilities: #a78bfa;
    --shopping: #f097c4;
    --food: #5bcff0;
    --cat-income: #3dd68c;
    --cat-food: #5bcff0;
    --cat-utilities: #a78bfa;
    --cat-shopping: #f097c4;
    --cat-savings: #f0c45b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-month {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .header-sync {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-sync:hover { border-color: var(--accent); color: var(--accent); }

  /* NAV */
  .nav {
    display: flex;
    gap: 4px;
    padding: 16px 20px 0;
  }
  .nav-btn {
    flex: 1;
    padding: 9px 4px;
    border: none;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .nav-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* VIEWS */
  .view { display: none; padding: 16px 20px 100px; }
  .view.active { display: block; }

  /* DASHBOARD */
  .month-selector {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-arrow {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .month-arrow:hover { border-color: var(--accent); }
  .month-label { font-weight: 700; font-size: 15px; }

  .net-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .net-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .net-amount { font-size: 40px; font-weight: 800; letter-spacing: -2px; }
  .net-amount.positive { color: var(--income); }
  .net-amount.negative { color: var(--expense); }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .summary-card-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .summary-card-amount { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
  .summary-card-amount.income { color: var(--income); }
  .summary-card-amount.expense { color: var(--expense); }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 4px;
  }

  .category-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .category-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .category-bar-name { font-size: 13px; font-weight: 700; }
  .category-bar-nums { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .category-bar-nums span { color: var(--text); }
  .bar-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-pct {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }
  .bar-pct.over { color: var(--expense); }

  /* RECENT */
  .entry-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .entry-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .entry-amount.income { color: var(--income); }
  .entry-amount.expense { color: var(--expense); }
  .entry-actions { display: flex; gap: 6px; }
  .entry-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .entry-btn:hover { border-color: var(--accent); color: var(--text); }
  .entry-btn.delete:hover { border-color: var(--expense); color: var(--expense); }

  /* LOG FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .form-card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }
  .type-btn {
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.active.income { border-color: var(--income); color: var(--income); background: rgba(61,214,140,0.08); }
  .type-btn.active.expense { border-color: var(--expense); color: var(--expense); background: rgba(240,91,91,0.08); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); font-weight: 400; }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .cat-btn {
    padding: 9px 6px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .cat-btn.active { color: var(--text); }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    margin-top: 4px;
  }
  .submit-btn:hover { background: #4a79df; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  /* GOALS */
  .goal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .goal-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .goal-info { flex: 1; }
  .goal-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .goal-current { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .goal-input-wrap { display: flex; align-items: center; gap: 8px; }
  .goal-prefix { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .goal-input {
    width: 90px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 10px;
    outline: none;
    text-align: right;
    transition: border-color 0.2s;
  }
  .goal-input:focus { border-color: var(--accent); }

  .goals-save-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .goals-save-btn:hover { background: var(--accent); color: #fff; }

  /* ENTRIES VIEW */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 7px 13px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(91,138,240,0.08); }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; }
  .modal-close {
    float: right;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  .no-entries { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">BudgetLog</div>
    <div class="header-month" id="headerMonth"></div>
  </div>
  <button class="header-sync" id="syncBtn">⟳ Sync to Sheets</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showView('dashboard')">Dashboard</button>
  <button class="nav-btn" onclick="showView('log')">+ Log</button>
  <button class="nav-btn" onclick="showView('entries')">Entries</button>
  <button class="nav-btn" onclick="showView('goals')">Goals</button>
</div>

<!-- DASHBOARD -->
<div class="view active" id="view-dashboard">
  <div class="month-selector">
    <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="dashMonth"></div>
    <button class="month-arrow" onclick="changeMonth(1)">›</button>
  </div>

  <div class="net-card">
    <div class="net-label">Net Balance</div>
    <div class="net-amount" id="netAmount">$0.00</div>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-card-label">Income</div>
      <div class="summary-card-amount income" id="totalIncome">$0.00</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label">Expenses</div>
      <div class="summary-card-amount expense" id="totalExpenses">$0.00</div>
    </div>
  </div>

  <div class="section-title">Category Breakdown</div>
  <div id="categoryBars"></div>

  <div class="section-title" style="margin-top:18px;">Recent Entries</div>
  <div id="recentEntries"></div>
</div>

<!-- LOG -->
<div class="view" id="view-log">
  <div class="form-card">
    <div class="form-card-title">New Entry</div>

    <div class="type-toggle">
      <button class="type-btn expense active" id="typeExpense" onclick="setType('expense')">Expense</button>
      <button class="type-btn income" id="typeIncome" onclick="setType('income')">Income</button>
    </div>

    <div class="form-group">
      <label class="form-label">Amount</label>
      <input class="form-input" type="number" id="logAmount" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" type="text" id="logDesc" placeholder="e.g. McDonald's">
    </div>

    <div class="form-group" id="catGroup">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" type="date" id="logDate">
    </div>

    <button class="submit-btn" onclick="logEntry()">Add Entry</button>
  </div>
</div>

<!-- ENTRIES -->
<div class="view" id="view-entries">
  <div class="month-selector">
    <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="entriesMonth"></div>
    <button class="month-arrow" onclick="changeMonth(1)">›</button>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div id="entriesList"></div>
</div>

<!-- GOALS -->
<div class="view" id="view-goals">
  <div class="section-title">Monthly Goals</div>
  <div id="goalsList"></div>
  <button class="goals-save-btn" onclick="saveGoals()">Save Goals</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div class="modal-title" style="margin-bottom:0;">Edit Entry</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Amount</label>
      <input class="form-input" type="number" id="editAmount" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" type="text" id="editDesc">
    </div>
    <div class="form-group" id="editCatGroup">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="editCatGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" type="date" id="editDate">
    </div>
    <button class="submit-btn" onclick="saveEdit()">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  { id: 'food',      label: 'Food & Groc.',  color: 'var(--cat-food)' },
  { id: 'utilities', label: 'Utilities',     color: 'var(--cat-utilities)' },
  { id: 'shopping',  label: 'Shopping',      color: 'var(--cat-shopping)' },
  { id: 'savings',   label: 'Savings',       color: 'var(--cat-savings)' },
];

// State
let entries = JSON.parse(localStorage.getItem('bl_entries') || '[]');
let goals   = JSON.parse(localStorage.getItem('bl_goals')   || '{"food":300,"utilities":150,"shopping":100,"savings":150,"income":1000}');
let currentType = 'expense';
let currentCat  = 'food';
let editCat     = 'food';
let editId      = null;
let activeFilter = 'all';

// Current month
const now = new Date();
let viewYear  = now.getFullYear();
let viewMonth = now.getMonth();

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmt(n) { return '$' + Math.abs(n).toFixed(2); }
function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function entryMonth(e) { return e.date.slice(0,7); }

function save() {
  localStorage.setItem('bl_entries', JSON.stringify(entries));
  localStorage.setItem('bl_goals',   JSON.stringify(goals));
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-btn')[['dashboard','log','entries','goals'].indexOf(v)].classList.add('active');
  if (v === 'dashboard') renderDashboard();
  if (v === 'entries')   renderEntries();
  if (v === 'goals')     renderGoals();
  if (v === 'log')       initLog();
}

function changeMonth(d) {
  viewMonth += d;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderDashboard();
  renderEntries();
  updateMonthLabels();
}

function updateMonthLabels() {
  const label = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
  document.getElementById('dashMonth').textContent    = label;
  document.getElementById('entriesMonth').textContent = label;
  document.getElementById('headerMonth').textContent  = label;
}

// ---- DASHBOARD ----
function renderDashboard() {
  updateMonthLabels();
  const mk = monthKey(viewYear, viewMonth);
  const mes = entries.filter(e => entryMonth(e) === mk);

  const totalIncome   = mes.filter(e => e.type === 'income').reduce((s,e) => s+e.amount, 0);
  const totalExpenses = mes.filter(e => e.type === 'expense').reduce((s,e) => s+e.amount, 0);
  const net = totalIncome - totalExpenses;

  document.getElementById('totalIncome').textContent   = fmt(totalIncome);
  document.getElementById('totalExpenses').textContent = fmt(totalExpenses);
  const netEl = document.getElementById('netAmount');
  netEl.textContent = (net < 0 ? '-' : '') + fmt(net);
  netEl.className = 'net-amount ' + (net >= 0 ? 'positive' : 'negative');

  // Category bars
  const barsEl = document.getElementById('categoryBars');
  barsEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const actual = mes.filter(e => e.type === 'expense' && e.category === cat.id).reduce((s,e) => s+e.amount, 0);
    const goal   = goals[cat.id] || 0;
    const pct    = goal > 0 ? Math.min((actual / goal) * 100, 100) : 0;
    const over   = goal > 0 && actual > goal;
    barsEl.innerHTML += `
      <div class="category-bar">
        <div class="category-bar-header">
          <div class="category-bar-name" style="color:${cat.color}">${cat.label}</div>
          <div class="category-bar-nums"><span>${fmt(actual)}</span> / ${fmt(goal)}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.color}${over?';background:var(--expense)':''}"></div></div>
        <div class="bar-pct ${over?'over':''}">${pct.toFixed(0)}%${over?' · over budget':''}</div>
      </div>`;
  });

  // Recent entries
  const recentEl = document.getElementById('recentEntries');
  const recent = [...mes].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,5);
  if (!recent.length) { recentEl.innerHTML = '<div class="no-entries">No entries this month</div>'; return; }
  recentEl.innerHTML = recent.map(e => entryHTML(e)).join('');
}

function entryHTML(e) {
  const cat = CATEGORIES.find(c => c.id === e.category);
  const color = e.type === 'income' ? 'var(--income)' : (cat ? cat.color : 'var(--muted)');
  const catLabel = e.type === 'income' ? 'Income' : (cat ? cat.label : '');
  return `
    <div class="entry-item">
      <div class="entry-dot" style="background:${color}"></div>
      <div class="entry-info">
        <div class="entry-desc">${e.description}</div>
        <div class="entry-meta">${e.date} · ${catLabel}</div>
      </div>
      <div class="entry-amount ${e.type}">${e.type === 'income' ? '+' : '-'}${fmt(e.amount)}</div>
      <div class="entry-actions">
        <button class="entry-btn" onclick="openEdit('${e.id}')">✎</button>
        <button class="entry-btn delete" onclick="deleteEntry('${e.id}')">✕</button>
      </div>
    </div>`;
}

// ---- LOG ----
function initLog() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('logDate').value = today;
  document.getElementById('logAmount').value = '';
  document.getElementById('logDesc').value = '';
  currentType = 'expense';
  currentCat  = 'food';
  document.getElementById('typeExpense').classList.add('active');
  document.getElementById('typeIncome').classList.remove('active');
  renderCatGrid('catGrid', currentCat, false);
  document.getElementById('catGroup').style.display = 'block';
}

function setType(t) {
  currentType = t;
  document.getElementById('typeExpense').classList.toggle('active', t === 'expense');
  document.getElementById('typeIncome').classList.toggle('active',  t === 'income');
  document.getElementById('catGroup').style.display = t === 'expense' ? 'block' : 'none';
}

function renderCatGrid(gridId, selected, isEdit) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn ${selected === c.id ? 'active' : ''}"
      style="${selected === c.id ? `border-color:${c.color};background:${c.color}22` : ''}"
      onclick="${isEdit ? `setEditCat('${c.id}')` : `setCat('${c.id}')`}">
      ${c.label}
    </button>`).join('');
}

function setCat(id) {
  currentCat = id;
  renderCatGrid('catGrid', currentCat, false);
}

function logEntry() {
  const amount = parseFloat(document.getElementById('logAmount').value);
  const desc   = document.getElementById('logDesc').value.trim();
  const date   = document.getElementById('logDate').value;
  if (!amount || amount <= 0) { showToast('Enter a valid amount'); return; }
  if (!desc)  { showToast('Add a description'); return; }
  if (!date)  { showToast('Pick a date'); return; }
  const entry = {
    id: Date.now().toString(),
    type: currentType,
    amount,
    description: desc,
    category: currentType === 'expense' ? currentCat : 'income',
    date
  };
  entries.unshift(entry);
  save();
  showToast('Entry added ✓');
  initLog();
}

// ---- ENTRIES ----
function renderEntries() {
  updateMonthLabels();
  const mk  = monthKey(viewYear, viewMonth);
  const mes = entries.filter(e => entryMonth(e) === mk);

  // Filter chips
  const filterRow = document.getElementById('filterRow');
  const filters = [{ id: 'all', label: 'All' }, { id: 'income', label: 'Income' }, { id: 'expense', label: 'Expenses' }, ...CATEGORIES.map(c => ({ id: c.id, label: c.label }))];
  filterRow.innerHTML = filters.map(f => `
    <button class="filter-chip ${activeFilter === f.id ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}</button>
  `).join('');

  let filtered = mes;
  if (activeFilter === 'income')  filtered = mes.filter(e => e.type === 'income');
  else if (activeFilter === 'expense') filtered = mes.filter(e => e.type === 'expense');
  else if (activeFilter !== 'all') filtered = mes.filter(e => e.category === activeFilter);

  const list = document.getElementById('entriesList');
  if (!filtered.length) { list.innerHTML = '<div class="no-entries">No entries found</div>'; return; }
  list.innerHTML = [...filtered].sort((a,b) => new Date(b.date)-new Date(a.date)).map(e => entryHTML(e)).join('');
}

function setFilter(f) {
  activeFilter = f;
  renderEntries();
}

// ---- GOALS ----
function renderGoals() {
  const mk = monthKey(viewYear, viewMonth);
  const mes = entries.filter(e => entryMonth(e) === mk);
  const gl = document.getElementById('goalsList');
  const incomeActual = mes.filter(e => e.type === 'income').reduce((s,e)=>s+e.amount,0);
  const allCats = [{ id: 'income', label: 'Income', color: 'var(--cat-income)' }, ...CATEGORIES];
  gl.innerHTML = allCats.map(c => {
    const actual = c.id === 'income' ? incomeActual : mes.filter(e => e.type === 'expense' && e.category === c.id).reduce((s,e)=>s+e.amount,0);
    return `
      <div class="goal-card">
        <div class="goal-dot" style="background:${c.color}"></div>
        <div class="goal-info">
          <div class="goal-name">${c.label}</div>
          <div class="goal-current">Actual: ${fmt(actual)}</div>
        </div>
        <div class="goal-input-wrap">
          <span class="goal-prefix">$</span>
          <input class="goal-input" type="number" id="goal_${c.id}" value="${goals[c.id] || 0}" step="10" min="0">
        </div>
      </div>`;
  }).join('');
}

function saveGoals() {
  const allCats = [{ id: 'income' }, ...CATEGORIES];
  allCats.forEach(c => {
    const val = parseFloat(document.getElementById('goal_' + c.id).value) || 0;
    goals[c.id] = val;
  });
  save();
  showToast('Goals saved ✓');
}

// ---- EDIT ----
function openEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editId  = id;
  editCat = e.category;
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editDesc').value   = e.description;
  document.getElementById('editDate').value   = e.date;
  const catGroup = document.getElementById('editCatGroup');
  catGroup.style.display = e.type === 'expense' ? 'block' : 'none';
  if (e.type === 'expense') renderCatGrid('editCatGrid', editCat, true);
  document.getElementById('editModal').classList.add('open');
}

function setEditCat(id) {
  editCat = id;
  renderCatGrid('editCatGrid', editCat, true);
}

function saveEdit() {
  const e = entries.find(x => x.id === editId);
  if (!e) return;
  const amount = parseFloat(document.getElementById('editAmount').value);
  const desc   = document.getElementById('editDesc').value.trim();
  const date   = document.getElementById('editDate').value;
  if (!amount || !desc || !date) { showToast('Fill all fields'); return; }
  e.amount      = amount;
  e.description = desc;
  e.date        = date;
  if (e.type === 'expense') e.category = editCat;
  save();
  closeModal();
  renderDashboard();
  renderEntries();
  showToast('Entry updated ✓');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editId = null;
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  renderDashboard();
  renderEntries();
  showToast('Entry deleted');
}

// ---- TOAST ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- SHEETS SYNC ----
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzpwnZwtyklCM-sk42mmNkXrW9cjYmf9pqI4JEcoU9YDl0jQTUbEGdEBaUaPqI_pkc/exec';
const SYNC_TOKEN = 'BL-' + btoa('adrian-budgetlog-2026').replace(/=/g,'');

async function syncToSheets() {
  const btn = document.getElementById('syncBtn');
  btn.textContent = '⟳ Syncing...';
  btn.style.pointerEvents = 'none';

  try {
    const payload = {
      action: 'sync',
      token: SYNC_TOKEN,
      entries,
      goals
    };

    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // no-cors means we can't read the response body, but if no error was thrown it went through
    const lastSync = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    localStorage.setItem('bl_last_sync', lastSync);
    showToast('Synced to Sheets ✓ ' + lastSync);
  } catch(err) {
    showToast('Sync failed — check connection');
  } finally {
    btn.textContent = '⟳ Sync to Sheets';
    btn.style.pointerEvents = 'auto';
    updateSyncLabel();
  }
}

function updateSyncLabel() {
  const last = localStorage.getItem('bl_last_sync');
  const btn = document.getElementById('syncBtn');
  btn.textContent = last ? `⟳ Last: ${last}` : '⟳ Sync to Sheets';
}

document.getElementById('syncBtn').addEventListener('click', syncToSheets);

// ---- INIT ----
updateMonthLabels();
renderDashboard();
initLog();
updateSyncLabel();
</script>
</body>
